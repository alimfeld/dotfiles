onboarding = false
# ── Terminal ────────────────────────────────────────────
[terminal]
default_shell = "/opt/homebrew/bin/fish"

[theme]
name = "gruvbox"
auto_switch = false

# ── Keys ────────────────────────────────────────────────
[keys]
prefix = "ctrl+space"
# tmux-style back-and-forth: jump to the last focused pane, across workspaces/tabs.
last_pane = "prefix+tab"

# fzf picker: select or create a workspace from directories under a base dir.
# Opens a temporary pane running fzf; the pane closes when the command exits.
[[keys.command]]
key = "prefix+f"
type = "pane"
command = "~/.config/herdr/herdr-workspace-picker.sh ~/dev"
