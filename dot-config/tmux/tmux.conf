# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ─────────────────────────────────────────────
set -g default-shell /opt/homebrew/bin/fish
set -g base-index 1                     # start numbering windows from one (default is zero)
setw -g pane-base-index 1               # start numbering panes from one (default is zero)
set -sg escape-time 0                   # don't wait after escape is input
setw -g mode-keys vi                    # use vi key bindings in copy mode
setw -g mouse on                        # add mouse support (select & resize panes, copy text, change window)
set -g focus-events on                  # pass through focus events to applications running in tmux
set -as terminal-features ",xterm*:RGB" # true color support
set -g extended-keys                    # report modifier keys (CSI u) to applications
set -g extended-keys-format csi-u       # use CSI u encoding for extended keys

# ── Key bindings ────────────────────────────────────────
bind v split-window -h
bind s split-window -v
bind m select-layout main-vertical
set -g main-pane-width 60%              # width of the main pane in the main-vertical layout
bind Tab display-popup -E "tmux-sessionizer"

# ── Copy mode ───────────────────────────────────────────
# Check default key bindings in copy-mode with vi key bindings by running: tmux list-keys -T copy-mode-vi
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection           # also bound to Space; overrides rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel # defaults to Enter in vi mode

# ── Pane navigation ─────────────────────────────────────
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator (Disable Wrapping)
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# ── Styling ─────────────────────────────────────────────
set -g @c_bg "black"
set -g @c_fg "white"
set -g @c_accent "blue"
set -g @c_muted "brightblack"

set -g pane-border-style "fg=#{@c_muted}"
set -g pane-active-border-style "fg=#{@c_accent}"

set -g status-style "bg=#{@c_bg},fg=#{@c_fg}"
set -g status-position top
set -g status-left-length 80
set -g status-left " #{=-77:session_name} "
set -g status-right-length 19
set -g status-right " %Y-%m-%d %H:%M "
set -g window-status-format "#[fg=#{@c_muted}] #I:#W#F "
set -g window-status-current-format "#[fg=#{@c_accent}] #I:#W#F "
